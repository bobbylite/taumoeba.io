name: Deploy Static Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject build metadata
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          # GitHub Pages URL: https://<owner>.github.io/<repo>  (project page)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          PAGES_URL="https://${OWNER}.github.io/${REPO_NAME}"
          sed -i "s|__COMMIT_SHA__|${SHORT_SHA}|g" index.html
          sed -i "s|__REPO_URL__|${REPO_URL}|g"   index.html
          sed -i "s|__PAGES_URL__|${PAGES_URL}|g" index.html
          echo "✓ version:   ${SHORT_SHA}"
          echo "✓ repo:      ${REPO_URL}"
          echo "✓ pages url: ${PAGES_URL}"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
